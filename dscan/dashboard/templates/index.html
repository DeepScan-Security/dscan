<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>dscan</title>
  <style>
    :root {
      --bg: #0f1115; --side: #161922; --line: #242837;
      --text: #e5e7eb; --muted: #9ca3af;
      --accent: #f59e0b; --clean: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fff; color: #111827;
    }
    .app { display: grid; grid-template-columns: 300px 1fr; grid-template-rows: auto 1fr; height: 100vh; }
    .topbar {
      grid-column: 1 / 3; display: flex; align-items: center; gap: 28px;
      padding: 14px 22px; background: var(--bg); color: var(--text);
      border-bottom: 1px solid var(--line);
    }
    .brand { font-weight: 700; font-size: 18px; letter-spacing: .5px; }
    .brand span { color: var(--accent); }
    .stat { display: flex; flex-direction: column; line-height: 1.1; }
    .stat .n { font-size: 22px; font-weight: 700; }
    .stat .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
    .sidebar { background: var(--side); color: var(--text); overflow-y: auto; padding: 10px; }
    .session {
      padding: 11px 12px; border-radius: 9px; cursor: pointer; margin-bottom: 5px;
      border: 1px solid transparent;
    }
    .session:hover { background: #1d2230; }
    .session.active { background: #222838; border-color: var(--accent); }
    .session .name { font-weight: 600; font-size: 14px; }
    .session .meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); margin-top: 5px; }
    .badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
    .badge.flagged { background: rgba(245, 158, 11, .18); color: var(--accent); }
    .badge.clean { background: rgba(16, 185, 129, .15); color: var(--clean); }
    .content { overflow-y: auto; padding: 26px 30px; }
    .content h2 { margin: 0 0 18px; font-size: 20px; }
    .empty { color: #9ca3af; text-align: center; margin-top: 90px; font-size: 14px; }
    .call { border: 1px solid #e5e7eb; border-radius: 11px; margin-bottom: 11px; overflow: hidden; transition: border-color .15s; }
    .call.flagged { background: #fff8ec; border-color: #f5c66b; }
    .call-head { display: flex; align-items: center; gap: 12px; padding: 13px 15px; cursor: pointer; }
    .call-head:hover { background: rgba(0, 0, 0, .02); }
    .tool { font-weight: 600; font-size: 14px; }
    .chev { color: #9ca3af; font-size: 12px; transition: transform .15s; }
    .call.open .chev { transform: rotate(90deg); }
    .dur { margin-left: auto; color: #9ca3af; font-size: 12px; font-variant-numeric: tabular-nums; }
    .call-body { display: none; padding: 4px 15px 15px; }
    .call.open .call-body { display: block; }
    .label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; margin: 10px 0 4px; }
    pre { background: #0f1115; color: #e5e7eb; border-radius: 8px; padding: 12px; overflow: auto; font-size: 12px; margin: 0; line-height: 1.5; }
    .redacted { color: var(--accent); font-weight: 700; }
    .reason { color: var(--accent); font-size: 12px; margin-top: 10px; font-weight: 600; }
    /* Trail (CWAT) findings */
    #s-critical { color: #6b7280; }
    #s-critical.on { color: #E24B4A; }
    .trail { padding: 0 15px 10px; display: flex; flex-direction: column; gap: 4px; }
    .trail-finding { font-size: 12px; font-weight: 700; }
    .trail-finding.critical { color: #E24B4A; }
    .trail-finding.high { color: #BA7517; }
    .trail-finding.medium { color: #B7770D; }
    .trail-finding.low { color: #6b7280; }
    .trail-finding .conf { font-weight: 500; color: #6b7280; }
    /* Shield: blocked calls (prevented, not just flagged) */
    #s-blocked { color: #6b7280; }
    #s-blocked.on { color: #DC2626; }
    .badge.blocked { background: rgba(220, 38, 38, .15); color: #DC2626; }
    .shield-finding { font-size: 12px; font-weight: 700; color: #DC2626; }
    .shield-finding .meta { font-weight: 500; color: #6b7280; }
    /* Tabs + attack reports */
    .tabs { display: flex; gap: 4px; margin-left: 18px; }
    .tab { background: transparent; color: var(--muted); border: none; padding: 6px 12px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .tab:hover { color: var(--text); }
    .tab.active { background: #222838; color: var(--text); }
    .attack-view { grid-column: 1 / 3; overflow-y: auto; padding: 26px 30px; background: #fff; display: none; }
    .app.attack .sidebar, .app.attack .content { display: none; }
    .app.attack .attack-view { display: block; }
    .report-card { border: 1px solid #e5e7eb; border-radius: 11px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; }
    .report-card:hover { background: rgba(0, 0, 0, .02); }
    .rc-head { display: flex; align-items: center; gap: 12px; }
    .rc-target { font-weight: 600; }
    .rc-meta { color: #6b7280; font-size: 12px; margin-top: 4px; }
    .badge.pass { background: rgba(16, 185, 129, .15); color: #10b981; }
    .badge.fail { background: rgba(220, 38, 38, .15); color: #DC2626; }
    table.attack-table { border-collapse: collapse; width: 100%; font-size: 13px; margin-top: 8px; }
    .attack-table th, .attack-table td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
    .attack-table th { color: #6b7280; font-weight: 600; }
    /* Audit tab */
    .audit-view { grid-column: 1 / 3; overflow-y: auto; padding: 26px 30px; background: #fff; display: none; }
    .app.audit .sidebar, .app.audit .content, .app.audit .attack-view { display: none; }
    .app.audit .audit-view { display: block; }
    .risk-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; text-transform: uppercase; }
    .risk-critical { background: rgba(220, 38, 38, .15); color: #DC2626; }
    .risk-high { background: rgba(186, 117, 23, .15); color: #BA7517; }
    .risk-medium { background: rgba(183, 119, 13, .15); color: #B7770D; }
    .risk-low { background: rgba(16, 185, 129, .15); color: #10b981; }
    .audit-srv { cursor: pointer; }
    .audit-srv:hover { background: rgba(0, 0, 0, .02); }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">d<span>scan</span></div>
      <div class="tabs">
        <button class="tab active" id="tab-traces">Traces</button>
        <button class="tab" id="tab-attack">Attack Reports</button>
        <button class="tab" id="tab-audit">Audit</button>
      </div>
      <div class="stat" style="margin-left: auto"><span class="n" id="s-calls">0</span><span class="l">calls today</span></div>
      <div class="stat"><span class="n" id="s-flagged">0</span><span class="l">flagged</span></div>
      <div class="stat"><span class="n" id="s-agents">0</span><span class="l">agents active</span></div>
      <div class="stat"><span class="n" id="s-critical">0</span><span class="l">critical</span></div>
      <div class="stat"><span class="n" id="s-blocked">0</span><span class="l">blocked</span></div>
    </div>
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"><div class="empty">Select a session to view its tool calls</div></div>
    <div class="attack-view" id="attack-view">
      <h2>Attack Reports</h2>
      <div id="attack-list"></div>
      <div id="attack-detail"></div>
    </div>
    <div class="audit-view" id="audit-view">
      <h2>Audit Reports</h2>
      <div id="audit-list"></div>
      <div id="audit-detail"></div>
    </div>
  </div>

  <script>
    window.__DSCAN_TRACES__ = __DSCAN_DATA__;
    let traces = window.__DSCAN_TRACES__ || [];
    let selected = null;
    let openCalls = new Set();

    const today = () => new Date().toISOString().slice(0, 10);
    const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    const isRedactedView = (obj) => /\[REDACTED:[A-Z_]+\]/.test(JSON.stringify(obj));

    function highlight(obj) {
      let json = esc(JSON.stringify(obj === undefined ? null : obj, null, 2));
      return json.replace(/\[REDACTED:[A-Z_]+\]/g, (m) => '<span class="redacted">' + m + "</span>");
    }

    function fmtTime(ts) {
      if (!ts) return "";
      return ts.replace("T", " ").replace("Z", " UTC");
    }

    function sessionsFrom(list) {
      const map = new Map();
      for (const t of list) {
        const id = t.session_id || "unknown";
        if (!map.has(id)) map.set(id, { session_id: id, agent: t.agent || "agent", ts: t.ts || "", flagged: false, calls: [] });
        const s = map.get(id);
        s.calls.push(t);
        if (t.flagged) s.flagged = true;
        if ((t.ts || "") > s.ts) s.ts = t.ts || "";
      }
      const arr = [...map.values()];
      arr.forEach((s) => s.calls.sort((a, b) => (a.ts || "").localeCompare(b.ts || "")));
      arr.sort((a, b) => (b.ts || "").localeCompare(a.ts || ""));
      return arr;
    }

    const SEV_RANK = { critical: 3, high: 2, medium: 1, low: 0 };
    const TRAIL_BORDER = { critical: "#E24B4A", high: "#BA7517", medium: "#B7770D", low: "#6b7280" };

    const trailFindings = (c) => (c.trail_findings || []).filter(Boolean);

    function topTrailSeverity(findings) {
      if (!findings.length) return null;
      return findings.reduce(
        (a, b) => ((SEV_RANK[b.severity] || 0) > (SEV_RANK[a.severity] || 0) ? b : a)
      ).severity;
    }

    function renderStats() {
      const d = today();
      const todays = traces.filter((t) => (t.ts || "").slice(0, 10) === d);
      document.getElementById("s-calls").textContent = todays.length;
      document.getElementById("s-flagged").textContent = traces.filter((t) => t.flagged).length;
      document.getElementById("s-agents").textContent = new Set(todays.map((t) => t.agent)).size;
      const critical = todays.reduce(
        (n, t) => n + trailFindings(t).filter((f) => f.severity === "critical").length,
        0
      );
      const cEl = document.getElementById("s-critical");
      cEl.textContent = critical;
      cEl.classList.toggle("on", critical > 0);

      const blocked = todays.filter((t) => t.blocked === true).length;
      const bEl = document.getElementById("s-blocked");
      bEl.textContent = blocked;
      bEl.classList.toggle("on", blocked > 0);
    }

    function renderSidebar(sessions) {
      const sb = document.getElementById("sidebar");
      sb.innerHTML = sessions.length ? "" : '<div class="empty">No sessions yet</div>';
      for (const s of sessions) {
        const el = document.createElement("div");
        el.className = "session" + (s.session_id === selected ? " active" : "");
        el.innerHTML =
          '<div class="name">' + esc(s.agent) + "</div>" +
          '<div class="meta"><span>' + esc(fmtTime(s.ts)) + "</span>" +
          '<span class="badge ' + (s.flagged ? "flagged" : "clean") + '">' + (s.flagged ? "flagged" : "clean") + "</span></div>";
        el.onclick = () => { selected = s.session_id; render(); };
        sb.appendChild(el);
      }
    }

    function renderContent(sessions) {
      const content = document.getElementById("content");
      const sess = sessions.find((s) => s.session_id === selected);
      if (!sess) {
        content.innerHTML = '<div class="empty">Select a session to view its tool calls</div>';
        return;
      }
      content.innerHTML = "<h2>" + esc(sess.agent) + "</h2>";
      sess.calls.forEach((c, i) => {
        const key = sess.session_id + ":" + i;
        const el = document.createElement("div");
        el.className = "call" + (c.flagged ? " flagged" : "") + (openCalls.has(key) ? " open" : "");
        const findings = trailFindings(c);
        const topSev = topTrailSeverity(findings);
        if (c.blocked === true) {
          el.style.borderLeft = "5px solid #DC2626"; // strongest: prevented
        } else if (topSev) {
          el.style.borderLeft = "4px solid " + (TRAIL_BORDER[topSev] || "#6b7280");
        }
        const head = document.createElement("div");
        head.className = "call-head";
        const badge =
          c.blocked === true
            ? '<span class="badge blocked">BLOCKED</span>'
            : c.flagged
            ? '<span class="badge flagged">flagged</span>'
            : "";
        head.innerHTML =
          '<span class="chev">&#9654;</span><span class="tool">' + esc(c.tool || "?") + "</span>" +
          badge +
          '<span class="dur">' + (c.duration_ms || 0) + " ms</span>";
        const body = document.createElement("div");
        body.className = "call-body";
        body.innerHTML =
          '<div class="label">params</div><pre>' + highlight(c.params) + "</pre>" +
          '<div class="label">result</div><pre>' + highlight(c.result) + "</pre>" +
          (c.flag_reason ? '<div class="reason">&#9873; ' + esc(c.flag_reason) + "</div>" : "");
        head.onclick = () => {
          if (openCalls.has(key)) openCalls.delete(key); else openCalls.add(key);
          el.classList.toggle("open");
        };
        el.appendChild(head);
        if (c.blocked === true) {
          const parts = String(c.block_reason || "injection:shield").split(":");
          const category = parts[0] || "injection";
          const scanner = parts[1] || "shield";
          const sh = document.createElement("div");
          sh.className = "trail";
          sh.innerHTML =
            '<div class="shield-finding">&#128737; Blocked by shield: ' +
            esc(category) +
            ' <span class="meta">(' + esc(scanner) + ")</span></div>";
          el.appendChild(sh);
        } else if (findings.length) {
          const tr = document.createElement("div");
          tr.className = "trail";
          tr.innerHTML = findings
            .map(
              (f) =>
                '<div class="trail-finding ' + esc(f.severity) + '">&#9873; ' +
                esc(f.pattern) +
                ' <span class="conf">(' + esc(f.severity) + " &middot; " +
                Math.round((f.confidence || 0) * 100) + "% confidence)</span></div>"
            )
            .join("");
          el.appendChild(tr);
        }
        el.appendChild(body);
        content.appendChild(el);
      });
    }

    function render() {
      const sessions = sessionsFrom(traces);
      renderStats();
      renderSidebar(sessions);
      renderContent(sessions);
    }

    async function refresh() {
      try {
        const r = await fetch("/api/traces");
        if (r.ok) { traces = await r.json(); render(); }
      } catch (e) { /* keep last good state */ }
    }

    // ── Attack Reports tab ──
    const ATTACK_SEV = { critical: "#DC2626", high: "#BA7517", medium: "#B7770D", low: "#6b7280" };
    let attackReports = [];

    let auditReports = [];

    function switchTab(tab) {
      const app = document.querySelector(".app");
      for (const t of ["traces", "attack", "audit"]) {
        document.getElementById("tab-" + t).classList.toggle("active", tab === t);
      }
      app.classList.toggle("attack", tab === "attack");
      app.classList.toggle("audit", tab === "audit");
      if (tab === "attack") loadAttackReports();
      if (tab === "audit") loadAuditReports();
    }

    const AUDIT_BORDER = { critical: "#DC2626", high: "#BA7517", medium: "#B7770D", low: "#10b981" };

    async function loadAuditReports() {
      try {
        const r = await fetch("/api/audit-reports");
        auditReports = r.ok ? await r.json() : [];
      } catch (e) { auditReports = []; }
      renderAuditList();
    }

    function renderAuditList() {
      const list = document.getElementById("audit-list");
      const detail = document.getElementById("audit-detail");
      if (!auditReports.length) {
        list.innerHTML = '<div class="empty">No audit reports yet. Run: dscan audit</div>';
        detail.innerHTML = "";
        return;
      }
      list.innerHTML = "";
      for (const rep of auditReports) {
        const el = document.createElement("div");
        el.className = "report-card";
        const badge = rep.passed
          ? '<span class="badge pass">PASSED</span>'
          : '<span class="badge fail">FAILED</span>';
        el.innerHTML =
          '<div class="rc-head"><span class="rc-target">' + esc(rep.filename) + "</span>" +
          badge +
          '<span style="margin-left:auto;color:#6b7280;font-size:12px">' + esc(fmtTime(rep.timestamp)) + "</span></div>" +
          '<div class="rc-meta">' + (rep.server_count || 0) + " servers &middot; " +
          (rep.critical_count || 0) + " critical &middot; " + (rep.high_count || 0) + " high</div>";
        el.onclick = () => openAuditReport(rep.filename);
        list.appendChild(el);
      }
    }

    async function openAuditReport(filename) {
      const detail = document.getElementById("audit-detail");
      try {
        const r = await fetch("/api/audit-reports/" + encodeURIComponent(filename));
        if (!r.ok) { detail.innerHTML = '<div class="empty">Could not load report</div>'; return; }
        renderAuditDetail(await r.json());
      } catch (e) { detail.innerHTML = '<div class="empty">Could not load report</div>'; }
    }

    function renderAuditDetail(data) {
      const detail = document.getElementById("audit-detail");
      const servers = data.servers || [];
      const order = { critical: 0, high: 1, medium: 2, low: 3 };
      const sorted = servers
        .map((s, i) => ({ s, i }))
        .sort((a, b) => (order[a.s.risk_level] ?? 9) - (order[b.s.risk_level] ?? 9));
      let html =
        '<h3 style="margin-top:20px">' + esc((data.source_files || []).join(", ") || "audit") + "</h3>" +
        '<table class="attack-table"><thead><tr><th>Server</th><th>Risk</th><th>Score</th>' +
        "<th>Findings</th><th>Status</th></tr></thead><tbody>";
      for (const { s, i } of sorted) {
        const lvl = s.risk_level || "low";
        const status = (lvl === "critical" || lvl === "high")
          ? '<span style="color:#DC2626">FAIL</span>'
          : '<span style="color:#10b981">OK</span>';
        html +=
          '<tr class="audit-srv" data-i="' + i + '"><td>' + esc(s.name) + "</td>" +
          '<td><span class="risk-badge risk-' + esc(lvl) + '">' + esc(lvl.toUpperCase()) + "</span></td>" +
          "<td>" + (s.risk_score || 0) + "</td>" +
          "<td>" + (s.findings || []).length + "</td>" +
          "<td>" + status + "</td></tr>";
      }
      html += "</tbody></table><div id=\"audit-findings\"></div>";
      detail.innerHTML = html;
      detail.querySelectorAll(".audit-srv").forEach((row) => {
        row.onclick = () => renderAuditFindings(servers[parseInt(row.dataset.i, 10)]);
      });
    }

    function renderAuditFindings(server) {
      const box = document.getElementById("audit-findings");
      const findings = server.findings || [];
      if (!findings.length) {
        box.innerHTML = '<div style="color:#6b7280;margin-top:14px">No findings for ' + esc(server.name) + "</div>";
        return;
      }
      const order = { critical: 0, high: 1, medium: 2, low: 3 };
      const sorted = findings.slice().sort(
        (a, b) => (order[a.risk_level] ?? 9) - (order[b.risk_level] ?? 9)
      );
      box.innerHTML =
        '<h4 style="margin:18px 0 8px">' + esc(server.name) + " findings</h4>" +
        sorted.map((f) => {
          const lvl = f.risk_level || "low";
          const cve = f.cve_id ? ' <span style="color:#DC2626">' + esc(f.cve_id) + "</span>" : "";
          return '<div style="border-left:3px solid ' + (AUDIT_BORDER[lvl] || "#6b7280") +
            ';padding:8px 12px;margin-bottom:8px;background:rgba(0,0,0,.015)">' +
            '<div style="font-weight:700">' +
            '<span class="risk-badge risk-' + esc(lvl) + '">' + esc(f.check_id || "") + "</span> " +
            esc(f.title || "") + cve + "</div>" +
            '<div style="color:#6b7280;font-size:12px;margin-top:4px">' + esc(f.detail || "") + "</div>" +
            '<div style="color:#374151;font-size:12px;margin-top:4px">Fix: ' + esc(f.recommendation || "") + "</div></div>";
        }).join("");
    }

    async function loadAttackReports() {
      try {
        const r = await fetch("/api/attack-reports");
        attackReports = r.ok ? await r.json() : [];
      } catch (e) { attackReports = []; }
      renderAttackList();
    }

    function renderAttackList() {
      const list = document.getElementById("attack-list");
      const detail = document.getElementById("attack-detail");
      if (!attackReports.length) {
        list.innerHTML = '<div class="empty">No attack reports yet. Run: dscan attack ./your_agent.py</div>';
        detail.innerHTML = "";
        return;
      }
      list.innerHTML = "";
      for (const rep of attackReports) {
        const el = document.createElement("div");
        el.className = "report-card";
        const badge = rep.passed
          ? '<span class="badge pass">PASSED</span>'
          : '<span class="badge fail">FAILED</span>';
        el.innerHTML =
          '<div class="rc-head"><span class="rc-target">' + esc(rep.target || rep.filename) + "</span>" +
          badge +
          '<span style="margin-left:auto;color:#6b7280;font-size:12px">' + esc(fmtTime(rep.timestamp)) + "</span></div>" +
          '<div class="rc-meta">' + (rep.critical_count || 0) + " critical &middot; " + (rep.high_count || 0) + " high</div>";
        el.onclick = () => openReport(rep.filename);
        list.appendChild(el);
      }
    }

    async function openReport(filename) {
      const detail = document.getElementById("attack-detail");
      try {
        const r = await fetch("/api/attack-reports/" + encodeURIComponent(filename));
        if (!r.ok) { detail.innerHTML = '<div class="empty">Could not load report</div>'; return; }
        renderReportDetail(await r.json());
      } catch (e) { detail.innerHTML = '<div class="empty">Could not load report</div>'; }
    }

    function renderReportDetail(data) {
      const detail = document.getElementById("attack-detail");
      const order = { critical: 0, high: 1, medium: 2, low: 3 };
      const findings = (data.findings || []).slice().sort(
        (a, b) => (order[a.severity] ?? 9) - (order[b.severity] ?? 9)
      );
      const rows = findings.map((f) =>
        "<tr><td>" + esc(f.id || "") + "</td>" +
        '<td style="color:' + (ATTACK_SEV[f.severity] || "#000") + ';font-weight:700">' +
        esc((f.severity || "").toUpperCase()) + "</td>" +
        "<td>" + esc(f.name || "") + "</td>" +
        "<td>" + (f.succeeded
          ? '<span style="color:#DC2626">&#10007; Found</span>'
          : '<span style="color:#10b981">&#10003; Clean</span>') + "</td>" +
        "<td>" + Math.round((f.confidence || 0) * 100) + "%</td></tr>"
      ).join("");
      const s = data.summary || {};
      detail.innerHTML =
        '<h3 style="margin-top:20px">' + esc(data.target || "") + "</h3>" +
        '<div style="color:#6b7280;font-size:13px;margin-bottom:8px">' +
        (s.critical_count || 0) + " critical &middot; " + (s.high_count || 0) + " high &middot; " +
        (s.passed ? "PASSED" : "FAILED") + "</div>" +
        '<table class="attack-table"><thead><tr><th>ID</th><th>Severity</th><th>Name</th>' +
        "<th>Result</th><th>Confidence</th></tr></thead><tbody>" + rows + "</tbody></table>";
    }

    document.getElementById("tab-traces").onclick = () => switchTab("traces");
    document.getElementById("tab-attack").onclick = () => switchTab("attack");
    document.getElementById("tab-audit").onclick = () => switchTab("audit");

    render();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
